<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoConnect — Trouvez votre voiture, rencontrez le vendeur</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #09090B; color: #FAFAFA; -webkit-font-smoothing: antialiased; }
    select { appearance: none; cursor: pointer; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #09090B; }
    ::-webkit-scrollbar-thumb { background: #27272A; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

    /* Hamburger caché par défaut (desktop) */
    .ac-nav-burger { display: none; }

    /* ── Responsive mobile ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Navbar — on cache UNIQUEMENT les liens de navigation,
         pas la section auth/utilisateur (Connexion / S'inscrire / avatar) */
      .ac-nav-links { display: none !important; }
      .ac-nav-burger { display: block !important; }
      .ac-nav { padding: 0 12px !important; }
      .ac-nav-auth { gap: 6px !important; }
      .ac-auth-btns { gap: 6px !important; }
      .ac-btn-login { padding: 7px 12px !important; font-size: 13px !important; }
      .ac-btn-register { padding: 7px 14px !important; font-size: 13px !important; }
      .ac-user-btn { padding: 6px 10px !important; font-size: 12px !important; }
      .ac-user-name { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      /* Hero */
      .ac-hero-title { font-size: 32px !important; }
      .ac-hero-sub { font-size: 15px !important; }
      .ac-hero-actions { flex-direction: column !important; gap: 10px !important; }
      /* Grids */
      .ac-grid-3 { grid-template-columns: 1fr !important; }
      .ac-grid-2 { grid-template-columns: 1fr !important; }
      .ac-grid-auto { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important; }
      /* Cards */
      .ac-page { padding: 88px 16px 40px !important; }
      /* Sections */
      .ac-section { padding: 48px 16px !important; }
      /* Stats row */
      .ac-stats { flex-wrap: wrap !important; gap: 12px !important; }
      .ac-stats > * { flex: 1 1 calc(50% - 6px) !important; min-width: 120px !important; }
      /* Filters */
      .ac-filters { flex-direction: column !important; }
      .ac-filters > * { width: 100% !important; }
      /* Detail layout */
      .ac-detail-grid { flex-direction: column !important; }
      /* Auth */
      .ac-auth-card { padding: 24px 20px !important; }
      /* Dashboard tabs */
      .ac-tabs { flex-wrap: wrap !important; gap: 6px !important; }
      .ac-tabs > * { flex: 1 1 auto !important; font-size: 12px !important; padding: 8px 10px !important; }
      /* Messages */
      .ac-msg-layout { flex-direction: column !important; }
      .ac-msg-sidebar { width: 100% !important; max-height: 260px !important; border-right: none !important; border-bottom: 1px solid #27272A !important; }
    }

    @media (max-width: 480px) {
      .ac-hero-title { font-size: 26px !important; }
      .ac-car-card-img { height: 160px !important; }
      .ac-stats > * { flex: 1 1 100% !important; }
      /* Sur très petits écrans, on raccourcit Connexion -> icône optionnelle,
         et on réduit encore la taille des boutons auth */
      .ac-btn-login { padding: 6px 10px !important; font-size: 12px !important; }
      .ac-btn-register { padding: 6px 12px !important; font-size: 12px !important; }
      .ac-admin-btn { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
