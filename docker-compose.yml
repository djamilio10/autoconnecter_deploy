services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Lit POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD directement dans
    # .env.production (plus besoin d'un fichier .env pour l'interpolation).
    env_file: .env.production
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoconnect}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    # Toutes les variables (POSTGRES_*, SECRET_KEY, EMAIL_*, PAYTECH_*, ...)
    # viennent de .env.production. L'URL de la base est construite dans
    # settings.py à partir de POSTGRES_* : pas d'interpolation docker-compose.
    env_file: .env.production
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    build: ./frontend
    restart: unless-stopped
    # ADMIN_USER / ADMIN_PASSWORD_HASH : identifiants du basic_auth qui protège
    # /admin/. Lus depuis .env.production (hors dépôt) et injectés dans le
    # Caddyfile via {env.…}.
    env_file: .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
  media_data:
  caddy_data:
  caddy_config:
