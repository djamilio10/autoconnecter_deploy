services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoconnect}
      POSTGRES_USER: ${POSTGRES_USER:-autoconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoconnect}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      # sslmode=disable : Postgres tourne en local sur le réseau Docker interne,
      # pas de TLS à négocier (settings.py impose ssl_require=True en prod sinon).
      DATABASE_URL: postgresql://${POSTGRES_USER:-autoconnect}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-autoconnect}?sslmode=disable
      REDIS_URL: redis://redis:6379
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
  media_data:
  caddy_data:
  caddy_config:
